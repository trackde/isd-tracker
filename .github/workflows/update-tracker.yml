name: Update ISD Legislative Tracker

on:
  schedule:
    # Runs weekdays at noon UTC (8 AM Eastern / 9 AM EDT)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker update script
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: python update_tracker.py

      - name: Commit and push if changes were made
        run: |
          git config user.name  "ISD Tracker Bot"
          git config user.email "admin@indivisiblesode.org"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: bill statuses $(date -u '+%Y-%m-%d')"
          git push
